version: '3.9'

services:
  # ── FastAPI Backend + Bundled Frontend ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finindex-rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount data directory so SQLite DB and PDF files persist across container restarts
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend Dev Server (development only — remove in production) ─────────────
  frontend-dev:
    image: node:20-alpine
    container_name: finindex-rag-frontend-dev
    working_dir: /app
    command: sh -c "npm ci --silent && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    profiles:
      - dev
    depends_on:
      - backend

networks:
  default:
    name: finindex-network
